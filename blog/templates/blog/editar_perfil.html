{% extends 'blog/base.html' %}

{% block contenido %}
<div style="max-width: 500px; margin: 40px auto; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #efece6;">
    <h2 style="color: #4a3325; text-align: center; font-weight: bold; margin-bottom: 20px;">📝 Modificar mis datos</h2>
    
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ user_form.as_p }}
        <div style="margin: 20px 0; border-top: 1px dashed #efece6; padding-top: 15px;">
            {{ perfil_form.as_p }}
        </div>
        <button type="submit" style="background-color: #4a3325; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1rem; font-weight: bold;">Confirmar y guardar cambios</button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
        <a href="/perfil/" style="color: #8c786c; text-decoration: none;">← Cancelar y volver</a>
    </div>
</div>
{% endblock %}
